<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pengumuman Kelulusan</title>
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <style>
            :root {
                color-scheme: light;
                --bg: #f8fafc;
                --panel: #ffffff;
                --text: #0f172a;
                --muted: #475569;
                --primary: #1d4ed8;
                --primary-hover: #1e40af;
                --border: #cbd5e1;
                --success-bg: #ecfeff;
                --success-text: #155e75;
                --danger-bg: #fef2f2;
                --danger-text: #991b1b;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #eef2f7;
                color: var(--text);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                overflow-x: hidden;
            }

            .phone {
                width: 100%;
                max-width: 390px;
                border-radius: 40px;
                background: linear-gradient(180deg, #5b21b6 0%, #6d28d9 100%);
                padding: 10px;
                box-shadow: 0 20px 40px rgba(30, 41, 59, 0.22);
                position: relative;
            }

            .app {
                width: 100%;
                min-height: 760px;
                background:
                    radial-gradient(
                        260px 190px at 18% 10%,
                        #ffc04c 0%,
                        #f5a038 56%,
                        rgba(245, 160, 56, 0) 57%
                    ),
                    radial-gradient(
                        320px 250px at 98% 46%,
                        rgba(246, 31, 113, 0.94) 0%,
                        rgba(246, 31, 113, 0) 63%
                    ),
                    linear-gradient(
                        160deg,
                        #ff9e2f 0%,
                        #ff7a2f 24%,
                        #f23b72 50%,
                        #c0188a 72%,
                        #7f1db6 100%
                    );
                border: 2px solid #1e3a8a;
                border-radius: 30px;
                position: relative;
                overflow: hidden;
                padding: 102px 24px 28px;
            }

            .iphone-status {
                position: absolute;
                top: 20px;
                left: 20px;
                right: 28px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 4;
                font-size: 14px;
                font-weight: 700;
                color: #ffffff;
                pointer-events: none;
            }

            .status-left {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .status-time {
                font-weight: 700;
            }

            .status-app {
                width: 15px;
                height: 15px;
                border-radius: 50%;
                position: relative;
                flex: 0 0 auto;
                opacity: 1;
                box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.62);
            }

            .status-wa {
                background: #22c55e;
                overflow: visible;
            }

            .status-wa::before {
                content: "";
                position: absolute;
                width: 6px;
                height: 3.5px;
                border-radius: 4px;
                background: #fff;
                top: 5.5px;
                left: 4px;
                transform: rotate(-36deg);
            }

            .status-wa::after {
                content: "";
                position: absolute;
                width: 3px;
                height: 3px;
                background: #ffffff;
                clip-path: polygon(0 0, 100% 45%, 0 100%);
                bottom: -2px;
                left: 2px;
            }

            .status-tg {
                background: #0ea5e9;
                overflow: hidden;
            }

            .status-tg::before {
                content: "";
                position: absolute;
                width: 9px;
                height: 7px;
                background: #ffffff;
                clip-path: polygon(0 55%, 100% 0, 62% 100%, 48% 66%);
                top: 4px;
                left: 3px;
                transform: rotate(-6deg);
            }

            .island {
                position: absolute;
                top: 22px;
                left: 50%;
                transform: translateX(-50%);
                width: 110px;
                height: 30px;
                background: #0f172a;
                border-radius: 20px;
                z-index: 4;
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
                pointer-events: none;
            }

            .island::before {
                content: "";
                position: absolute;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 35% 35%,
                    #bbf7d0 0%,
                    #22c55e 30%,
                    #0f172a 70%
                );
                top: 11px;
                left: 28px;
                box-shadow:
                    0 0 0 1px rgba(187, 247, 208, 0.38),
                    0 0 8px rgba(34, 197, 94, 0.85);
            }

            .island.csv-ready::before {
                animation: cameraPulse 1.2s ease-in-out infinite;
            }

            @keyframes cameraPulse {
                0%,
                100% {
                    opacity: 0.65;
                    box-shadow:
                        0 0 0 1px rgba(187, 247, 208, 0.35),
                        0 0 6px rgba(34, 197, 94, 0.55);
                }
                50% {
                    opacity: 1;
                    box-shadow:
                        0 0 0 2px rgba(187, 247, 208, 0.75),
                        0 0 14px rgba(34, 197, 94, 1);
                }
            }

            .island::after {
                content: "";
                position: absolute;
                width: 34px;
                height: 5px;
                border-radius: 999px;
                background: rgba(148, 163, 184, 0.2);
                top: 12px;
                right: 18px;
            }

            .status-right {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .signal {
                display: flex;
                align-items: flex-end;
                gap: 1.5px;
                height: 13px;
            }

            .signal span {
                width: 2.2px;
                background: #fff;
                border-radius: 2px;
                opacity: 1;
            }

            .signal span:nth-child(1) {
                height: 5px;
            }
            .signal span:nth-child(2) {
                height: 7px;
            }
            .signal span:nth-child(3) {
                height: 10px;
            }
            .signal span:nth-child(4) {
                height: 13px;
            }

            .network-label {
                color: #fff;
                font-size: 10px;
                line-height: 1;
                font-weight: 800;
                letter-spacing: 0;
            }

            .wifi {
                width: 15px;
                height: 11px;
                position: relative;
                overflow: hidden;
                transform: translateY(2px);
            }

            .wifi::before,
            .wifi::after {
                content: "";
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                border: 2px solid transparent;
                border-top-color: #fff;
                border-radius: 50%;
            }

            .wifi::before {
                top: 0;
                width: 15px;
                height: 13px;
            }

            .wifi::after {
                top: 4px;
                width: 8px;
                height: 7px;
            }

            .wifi-dot {
                width: 3px;
                height: 3px;
                border-radius: 50%;
                background: #fff;
                position: absolute;
                left: 50%;
                bottom: 0;
                transform: translateX(-50%);
            }

            .battery {
                width: 23px;
                height: 12px;
                border: 1.7px solid #fff;
                border-radius: 3px;
                position: relative;
            }

            .battery::before {
                content: "";
                position: absolute;
                top: 2px;
                left: 2px;
                width: 16px;
                height: 6px;
                background: #fff;
                border-radius: 1px;
            }

            .battery::after {
                content: "";
                position: absolute;
                top: 3px;
                right: -4px;
                width: 2px;
                height: 4px;
                background: #fff;
                border-radius: 1px;
            }

            .shape-top-left,
            .shape-top-right,
            .shape-bottom {
                position: absolute;
                border-radius: 999px;
                pointer-events: none;
            }

            .shape-top-left {
                display: none;
            }
            .shape-top-right {
                display: none;
            }
            .shape-bottom {
                display: none;
            }

            .wallpaper-wave {
                position: absolute;
                pointer-events: none;
                z-index: 1;
                opacity: 0.85;
            }

            .wave-left {
                width: 360px;
                height: 220px;
                left: -86px;
                bottom: 86px;
                border-radius: 52% 48% 0 0 / 100% 100% 0 0;
                background: linear-gradient(
                    180deg,
                    rgba(74, 30, 164, 0.9) 0%,
                    rgba(95, 37, 191, 0.94) 100%
                );
                transform: rotate(-8deg);
            }

            .wave-mid {
                width: 300px;
                height: 170px;
                left: 44px;
                bottom: 72px;
                border-radius: 58% 42% 0 0 / 100% 100% 0 0;
                background: linear-gradient(
                    180deg,
                    rgba(229, 9, 143, 0.88) 0%,
                    rgba(165, 35, 216, 0.92) 100%
                );
                transform: rotate(7deg);
            }

            .wave-bottom {
                width: 360px;
                height: 130px;
                left: -6px;
                bottom: -34px;
                border-radius: 55% 45% 0 0 / 100% 100% 0 0;
                background: linear-gradient(
                    180deg,
                    rgba(131, 27, 199, 0.95) 0%,
                    rgba(104, 20, 176, 0.98) 100%
                );
                transform: rotate(-2deg);
            }

            .page-dots {
                position: relative;
                display: flex;
                justify-content: center;
                gap: 6px;
                z-index: 6;
                margin: 10px 0 8px;
                pointer-events: none;
            }

            .page-dots span {
                width: 5px;
                height: 5px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.75);
            }

            .page-dots span.active {
                width: 16px;
                background: rgba(255, 255, 255, 0.95);
            }

            .ios-search {
                position: relative;
                z-index: 2;
                margin: 0 auto 10px;
                width: 84%;
                height: 34px;
                border-radius: 11px;
                background: rgba(255, 255, 255, 0.9);
                border: 1px solid #c7d2e1;
                color: #64748b;
                font-size: 13px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }

            .ios-search-icon {
                width: 12px;
                height: 12px;
                border: 2px solid #64748b;
                border-radius: 50%;
                position: relative;
            }

            .ios-search-icon::after {
                content: "";
                position: absolute;
                width: 2px;
                height: 6px;
                background: #64748b;
                border-radius: 2px;
                right: -5px;
                bottom: -3px;
                transform: rotate(-40deg);
            }

            h1 {
                margin: 0 0 6px;
                font-size: 18px;
                line-height: 1.3;
                text-align: center;
                position: relative;
                z-index: 2;
                color: #f8fafc;
                text-shadow: 0 1px 8px rgba(15, 23, 42, 0.35);
            }

            p {
                margin: 0 0 10px;
                color: rgba(241, 245, 249, 0.95);
                font-size: 14px;
                line-height: 1.4;
                text-align: center;
                position: relative;
                z-index: 2;
            }

            .school-year {
                font-weight: 700;
            }

            .grid {
                display: grid;
                gap: 12px;
                margin-top: 10px;
                position: relative;
                z-index: 3;
            }

            label {
                display: none;
            }

            input[type="text"] {
                width: 92%;
                display: block;
                margin: 0 auto;
                border: 2px solid rgba(255, 255, 255, 0.9);
                border-radius: 999px;
                padding: 9px 14px;
                font-size: 20px;
                color: #ffffff;
                background: linear-gradient(
                    90deg,
                    rgba(124, 58, 237, 0.98) 0%,
                    rgba(109, 40, 217, 0.99) 100%
                );
                text-align: center;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
                box-shadow: 0 8px 18px rgba(17, 24, 39, 0.22);
                position: relative;
                z-index: 3;
            }

            input[type="text"]::placeholder {
                color: rgba(255, 255, 255, 0.95);
            }

            input[type="text"]:focus {
                outline: 3px solid #93c5fd;
                outline-offset: 2px;
            }

            button {
                margin: 14px auto 0;
                width: 64%;
                display: block;
                border: 2px solid rgba(255, 255, 255, 0.9);
                border-radius: 999px;
                background: linear-gradient(
                    90deg,
                    rgba(63, 163, 240, 0.96) 0%,
                    rgba(42, 146, 234, 0.98) 100%
                );
                color: #fff;
                font-size: 19px;
                font-weight: 700;
                padding: 8px 12px;
                cursor: pointer;
                transition: filter 0.15s ease;
                display: block;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
                box-shadow: 0 10px 22px rgba(17, 24, 39, 0.25);
                position: relative;
                z-index: 3;
            }

            button:hover {
                filter: brightness(0.96);
            }

            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .avatar-wrap {
                display: flex;
                justify-content: center;
                margin: 14px 0 10px;
                position: relative;
                z-index: 3;
            }

            .avatar {
                width: 96px;
                height: auto;
                max-height: 96px;
                object-fit: contain;
                background: transparent;
                border: 0;
                border-radius: 0;
            }

            .helper-link {
                margin-top: 14px;
                text-align: center;
                font-size: 13px;
                position: relative;
                z-index: 3;
            }

            .helper-link a {
                color: #fce7f3;
                text-decoration: none;
                font-weight: 700;
                text-shadow: 0 1px 4px rgba(15, 23, 42, 0.5);
            }

            .helper-link a:hover {
                text-decoration: underline;
            }

            .status {
                margin-top: 12px;
                font-size: 13px;
                color: rgba(241, 245, 249, 0.95);
                text-align: center;
                position: relative;
                z-index: 3;
            }

            .result {
                margin-top: 16px;
                border-radius: 8px;
                border: 1px solid var(--border);
                padding: 12px;
                display: none;
                position: relative;
                z-index: 3;
            }

            .result.success {
                background: var(--success-bg);
                color: var(--success-text);
                border-color: #a7f3d0;
                display: block;
            }

            .result.error {
                background: var(--danger-bg);
                color: var(--danger-text);
                border-color: #fecaca;
                display: block;
            }

            .result h2 {
                margin: 0 0 10px;
                font-size: 20px;
                line-height: 1.2;
            }

            .result-status {
                margin: 0 0 8px;
                display: inline-block;
                padding: 4px 10px;
                border-radius: 999px;
                background: rgba(13, 148, 136, 0.14);
                font-size: 13px;
                font-weight: 700;
            }

            .result ul {
                margin: 0;
                padding-left: 18px;
                font-size: 15px;
                line-height: 1.55;
            }

            .result li {
                margin: 4px 0;
            }

            .ios-dock {
                position: static;
                left: auto;
                right: auto;
                bottom: auto;
                margin: 16px auto 0;
                width: 88%;
                height: 60px;
                border-radius: 19px;
                background: linear-gradient(
                    180deg,
                    #ff1abf 0%,
                    #f000a6 52%,
                    #cf008f 100%
                );
                border: 1px solid rgba(255, 255, 255, 0.35);
                z-index: 6;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 14px;
                box-shadow: 0 12px 24px rgba(93, 0, 85, 0.38);
                position: relative;
            }

            .dock-item {
                width: 40px;
                height: 40px;
                border-radius: 11px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0;
                box-shadow: 0 4px 10px rgba(15, 23, 42, 0.28);
                position: relative;
                overflow: hidden;
                flex: 0 0 auto;
            }

            .dock-phone {
                background: linear-gradient(180deg, #2ef16b, #12be4a);
            }
            .dock-safari {
                background: linear-gradient(180deg, #7dd3fc, #2563eb);
            }
            .dock-msg {
                background: linear-gradient(180deg, #4ade80, #22c55e);
            }
            .dock-itunes {
                background: linear-gradient(180deg, #f9a8d4, #ec4899);
            }

            .dock-phone::before {
                content: "✆";
                color: #fff;
                font-size: 21px;
                transform: rotate(-12deg);
            }

            .dock-safari::before {
                content: "";
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 45% 45%,
                    #93c5fd 0%,
                    #dbeafe 32%,
                    #60a5fa 58%,
                    #2563eb 100%
                );
                box-shadow: inset 0 0 0 2px #ffffff;
            }

            .dock-safari::after {
                content: "";
                position: absolute;
                width: 2px;
                height: 11px;
                background: #ef4444;
                transform: rotate(40deg);
                border-radius: 2px;
            }

            .dock-msg::before {
                content: "";
                width: 24px;
                height: 18px;
                border-radius: 11px;
                background: #fff;
                position: relative;
            }

            .dock-msg::after {
                content: "";
                position: absolute;
                width: 8px;
                height: 8px;
                background: #fff;
                bottom: 8px;
                right: 8px;
                clip-path: polygon(100% 100%, 0 100%, 100% 0);
            }

            .dock-itunes::before {
                content: "♪";
                color: #fff;
                font-size: 22px;
                line-height: 1;
            }

            @media (max-width: 420px) {
                .phone {
                    max-width: none;
                    width: 100%;
                    border-radius: 24px;
                    padding: 6px;
                }

                .app {
                    min-height: calc(100dvh - 96px);
                    padding: 86px 14px 12px;
                    border-radius: 20px;
                    overflow: hidden;
                }

                .ios-search {
                    width: 92%;
                    margin-bottom: 10px;
                }

                h1 {
                    font-size: 15px;
                    margin-bottom: 4px;
                }

                p {
                    font-size: 12px;
                    margin-bottom: 8px;
                }

                .avatar-wrap {
                    margin: 10px 0 8px;
                }

                .avatar {
                    width: 76px;
                    max-height: 76px;
                }

                .grid {
                    margin-top: 8px;
                    gap: 8px;
                }

                input[type="text"] {
                    width: 96%;
                    font-size: 16px;
                    padding: 8px 12px;
                }

                button {
                    width: 58%;
                    font-size: 16px;
                    padding: 8px 10px;
                    margin-top: 10px;
                }

                .helper-link {
                    margin-top: 8px;
                    font-size: 12px;
                }

                .status {
                    margin-top: 8px;
                    font-size: 11px;
                }

                .result {
                    margin-top: 10px;
                    padding: 10px;
                }

                .result h2 {
                    font-size: 16px;
                    margin-bottom: 6px;
                }

                .result-status {
                    font-size: 12px;
                    margin-bottom: 6px;
                }

                .result ul {
                    font-size: 13px;
                    line-height: 1.45;
                }

                .page-dots {
                    margin: 9px 0 7px;
                }

                .ios-dock {
                    height: 54px;
                    padding: 0 12px;
                    z-index: 6;
                }

                .dock-item {
                    width: 36px;
                    height: 36px;
                }

                .wave-left {
                    width: 320px;
                    height: 200px;
                    left: -98px;
                    bottom: 86px;
                }

                .wave-mid {
                    width: 270px;
                    height: 150px;
                    left: 40px;
                    bottom: 74px;
                }

                .wave-bottom {
                    width: 320px;
                    height: 120px;
                    left: -10px;
                    bottom: -30px;
                }
            }
        </style>
    </head>
    <body>
        <div class="phone">
            <div class="iphone-status">
                <div class="status-left">
                    <span class="status-time">12:00</span>
                    <span class="status-app status-wa" aria-hidden="true"></span>
                    <span class="status-app status-tg" aria-hidden="true"></span>
                </div>
                <div class="status-right">
                    <div class="network-label">5G</div>
                    <div class="signal">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div class="wifi"><span class="wifi-dot"></span></div>
                    <div class="battery"></div>
                </div>
            </div>
            <div class="island" aria-hidden="true"></div>
            <main class="app">
                <div class="shape-top-left"></div>
                <div class="shape-top-right"></div>
                <div class="shape-bottom"></div>
                <div class="wallpaper-wave wave-left"></div>
                <div class="wallpaper-wave wave-mid"></div>
                <div class="wallpaper-wave wave-bottom"></div>
                <div class="ios-search">
                    <span class="ios-search-icon"></span>Search
                </div>

                <h1>
                    Pengumuman Kelulusan Kelas 9<br />SMP Negeri 2 Bangunrejo
                </h1>
                <p class="school-year">Tahun Pelajaran 2025/2026</p>
                <p>Masukkan data untuk melihat informasi kelulusan.</p>

                <div class="avatar-wrap">
                    <img
                        class="avatar"
                        src="./logosmpn2bare.png"
                        alt="Logo SMP Negeri 2 Bangunrejo"
                    />
                </div>

                <div class="grid">
                    <div>
                        <label for="namaInput">Nama</label>
                        <input id="namaInput" type="text" placeholder="Nama" />
                    </div>
                    <div>
                        <label for="nisnInput">NISN</label>
                        <input
                            id="nisnInput"
                            type="text"
                            inputmode="numeric"
                            placeholder="NISN"
                        />
                    </div>
                </div>

                <button id="searchBtn">Cari</button>
                <div class="helper-link">
                    <a
                        href="https://wa.me/6282376636929"
                        target="_blank"
                        rel="noopener noreferrer"
                        >Lupa NISN</a
                    >
                </div>

                <div id="statusText" class="status">
                    Memuat data kelulusan...
                </div>
                <section id="resultBox" class="result"></section>
                <div class="page-dots" aria-hidden="true">
                    <span></span><span class="active"></span><span></span>
                </div>
                <div class="ios-dock" aria-hidden="true">
                    <div class="dock-item dock-phone"></div>
                    <div class="dock-item dock-safari"></div>
                    <div class="dock-item dock-msg"></div>
                    <div class="dock-item dock-itunes"></div>
                </div>
            </main>
        </div>

        <script>
            const namaInput = document.getElementById("namaInput");
            const nisnInput = document.getElementById("nisnInput");
            const searchBtn = document.getElementById("searchBtn");
            const statusText = document.getElementById("statusText");
            const resultBox = document.getElementById("resultBox");
            const island = document.querySelector(".island");

            let students = [];
            let nisnKeyName = "";

            function cleanKey(key) {
                return String(key || "")
                    .trim()
                    .toLowerCase();
            }

            function normalizeNisn(value) {
                const digits = String(value || "").replace(/\D/g, "");
                const trimmed = digits.replace(/^0+/, "");
                return trimmed || "0";
            }

            function findKey(obj, aliases) {
                const entries = Object.keys(obj || {});
                for (const k of entries) {
                    const ck = cleanKey(k);
                    if (aliases.includes(ck)) return k;
                }
                return "";
            }

            function findHeaderIndex(matrix) {
                for (let i = 0; i < matrix.length; i++) {
                    const row = matrix[i] || [];
                    const normalized = row.map((c) => cleanKey(c));
                    if (normalized.includes("nisn")) return i;
                }
                return -1;
            }

            function buildRowsFromMatrix(matrix) {
                const headerIndex = findHeaderIndex(matrix);
                if (headerIndex < 0) return { rows: [], nisnHeader: "" };

                const headerRow = matrix[headerIndex];
                const nisnColIndex = headerRow.findIndex(
                    (c) => cleanKey(c) === "nisn",
                );
                if (nisnColIndex < 0) return { rows: [], nisnHeader: "" };

                let descriptorRow = [];
                for (let r = headerIndex - 1; r >= 0; r--) {
                    const candidate = matrix[r] || [];
                    const nonEmpty = candidate.filter(
                        (c) => String(c || "").trim() !== "",
                    ).length;
                    if (nonEmpty >= 3) {
                        descriptorRow = candidate;
                        break;
                    }
                }
                const findDescriptorCol = (aliases) => {
                    for (let i = 0; i < descriptorRow.length; i++) {
                        if (aliases.includes(cleanKey(descriptorRow[i])))
                            return i;
                    }
                    return -1;
                };

                const nameColByDescriptor = findDescriptorCol([
                    "nama peserta",
                    "nama",
                ]);
                const classColByDescriptor = findDescriptorCol(["kelas"]);
                const statusColByDescriptor = findDescriptorCol([
                    "status",
                    "status kelulusan",
                    "kelulusan",
                ]);
                const schoolColByDescriptor = findDescriptorCol([
                    "nama sekolah",
                    "sekolah",
                ]);

                const rows = [];
                for (let i = headerIndex + 1; i < matrix.length; i++) {
                    const source = matrix[i] || [];
                    const nisnValue = normalizeNisn(source[nisnColIndex]);
                    if (!nisnValue) continue;

                    const obj = {};
                    for (let j = 0; j < headerRow.length; j++) {
                        const key = String(headerRow[j] || "").trim();
                        if (!key) continue;
                        obj[key] = source[j] ?? "";
                    }

                    const nameCol =
                        nameColByDescriptor >= 0
                            ? nameColByDescriptor
                            : nisnColIndex + 1;
                    const classCol =
                        classColByDescriptor >= 0
                            ? classColByDescriptor
                            : nisnColIndex + 2;
                    const statusCol =
                        statusColByDescriptor >= 0
                            ? statusColByDescriptor
                            : nisnColIndex + 4;
                    const schoolCol =
                        schoolColByDescriptor >= 0
                            ? schoolColByDescriptor
                            : nisnColIndex + 3;

                    obj["NISN"] = source[nisnColIndex] ?? "";
                    obj["Nama"] = source[nameCol] ?? "";
                    obj["Kelas"] = source[classCol] ?? "";
                    obj["Status Kelulusan"] = source[statusCol] ?? "";
                    obj["Nama Sekolah"] =
                        schoolCol >= 0 ? (source[schoolCol] ?? "") : "";

                    rows.push(obj);
                }

                return { rows, nisnHeader: headerRow[nisnColIndex] };
            }

            function renderResult(type, html) {
                resultBox.className = `result ${type}`;
                resultBox.innerHTML = html;
            }

            function clearResult() {
                resultBox.className = "result";
                resultBox.innerHTML = "";
            }

            function openResultPage(student, queryNisn) {
                const nameKey = findKey(student, [
                    "nama",
                    "nama siswa",
                    "nama peserta",
                ]);
                const statusKey = findKey(student, [
                    "status",
                    "kelulusan",
                    "status kelulusan",
                    "keterangan lulus",
                ]);
                const classKey = findKey(student, ["kelas"]);
                const schoolKey = findKey(student, ["sekolah", "nama sekolah"]);

                const name = nameKey ? String(student[nameKey] || "").trim() : "";
                const kelas = classKey ? String(student[classKey] || "").trim() : "";
                const sekolah = schoolKey
                    ? String(student[schoolKey] || "").trim()
                    : "";
                const rawStatus = statusKey
                    ? String(student[statusKey] || "").trim()
                    : "";
                const status = rawStatus || "LULUS";

                const params = new URLSearchParams({
                    nama: name || "-",
                    nisn: queryNisn || "-",
                    kelas: kelas || "-",
                    sekolah: sekolah || "-",
                    status: status || "LULUS",
                });

                window.location.href = `./result.html?${params.toString()}`;
            }

            function setLoadedData(rows, detectedNisnKey) {
                if (!rows.length) {
                    students = [];
                    nisnKeyName = "";
                    statusText.textContent =
                        "File kosong atau tidak berisi data.";
                    return false;
                }

                const foundNisnKey =
                    detectedNisnKey || findKey(rows[0], ["nisn"]);
                if (!foundNisnKey) {
                    students = [];
                    nisnKeyName = "";
                    statusText.textContent = "Kolom NISN tidak ditemukan.";
                    return false;
                }

                students = rows;
                nisnKeyName = foundNisnKey;
                statusText.textContent = `Data berhasil dimuat: ${students.length} siswa.`;
                island?.classList.add("csv-ready");
                return true;
            }

            async function autoLoadDefaultCsv() {
                statusText.textContent = "Mencoba memuat data default...";
                try {
                    const res = await fetch("./kelulusan.cleaned.csv", {
                        cache: "no-store",
                    });
                    if (!res.ok)
                        throw new Error("Gagal mengambil file default.");
                    const text = await res.text();
                    const workbook = XLSX.read(text, { type: "string" });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const matrix = XLSX.utils.sheet_to_json(worksheet, {
                        header: 1,
                        defval: "",
                    });
                    const { rows, nisnHeader } = buildRowsFromMatrix(matrix);
                    if (!setLoadedData(rows, nisnHeader)) {
                        statusText.textContent =
                            "Data kelulusan tidak valid. Hubungi admin sekolah.";
                        return;
                    }
                    statusText.textContent += " (otomatis)";
                } catch (error) {
                statusText.textContent =
                    "Gagal memuat data kelulusan. Hubungi admin sekolah.";
                island?.classList.remove("csv-ready");
            }
            }

            searchBtn.addEventListener("click", () => {
                clearResult();

                if (!students.length || !nisnKeyName) {
                    renderResult(
                        "error",
                        "<h2>Data belum siap</h2><p>Data kelulusan belum tersedia. Coba lagi sebentar.</p>",
                    );
                    return;
                }

                const query = normalizeNisn(nisnInput.value);
                if (!query) {
                    renderResult(
                        "error",
                        "<h2>NISN kosong</h2><p>Masukkan NISN terlebih dahulu.</p>",
                    );
                    return;
                }

                const inputNama = String(namaInput.value || "").trim();
                if (!inputNama) {
                    renderResult(
                        "error",
                        "<h2>Nama kosong</h2><p>Masukkan nama terlebih dahulu.</p>",
                    );
                    return;
                }

                const student = students.find(
                    (row) => normalizeNisn(row[nisnKeyName]) === query,
                );
                if (!student) {
                    renderResult(
                        "error",
                        `<h2>Data tidak ditemukan</h2><p>NISN <strong>${query}</strong> tidak ada pada data.</p>`,
                    );
                    return;
                }

                openResultPage(student, query);
            });

            autoLoadDefaultCsv();
        </script>
    </body>
</html>
